<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Seguros de Veículos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 1s ease;
        }

        .chart-card h3 {
            color: #1f2937;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .table-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 1.2s ease;
        }

        .table-card h3 {
            color: #1f2937;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        td {
            color: #4b5563;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }

        .error {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .stat-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Sistema de Seguros de Veículos</h1>
            <p>Dashboard de Análise e Estatísticas</p>
        </header>

        <div id="loading" class="loading">
            Carregando dados...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <!-- Statistics Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-label">Total de Apólices</div>
                    <div class="stat-value" id="totalPolicies">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-label">Valor Médio do Seguro</div>
                    <div class="stat-value" id="avgInsurance">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🚙</div>
                    <div class="stat-label">Valor Médio do Veículo</div>
                    <div class="stat-value" id="avgVehicle">-</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📊 Distribuição de Valores</h3>
                    <canvas id="valueChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📈 Apólices por Valor do Seguro</h3>
                    <canvas id="insuranceChart"></canvas>
                </div>
            </div>

            <!-- Table -->
            <div class="table-card">
                <h3>📋 Lista de Apólices</h3>
                <div id="tableContainer"></div>
                <button class="refresh-btn" onclick="loadData()">🔄 Atualizar Dados</button>
            </div>
        </div>
    </div>

    <script>
        let valueChart, insuranceChart;

        async function loadData() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                document.getElementById('dashboard').style.display = 'none';

                // Buscar relatório
                const reportResponse = await fetch('/api/insurance/report');
                const reportData = await reportResponse.json();

                // Buscar lista de apólices
                const policiesResponse = await fetch('/api/insurance');
                const policies = await policiesResponse.json();

                // Atualizar cards de estatísticas
                document.getElementById('totalPolicies').textContent = reportData.totalPolicies;
                document.getElementById('avgInsurance').textContent = 
                    `R$ ${reportData.averageInsuranceValue.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('avgVehicle').textContent = 
                    `R$ ${reportData.averageVehicleValue.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

                // Renderizar gráficos
                renderCharts(policies, reportData);

                // Renderizar tabela
                renderTable(policies);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 
                    '❌ Erro ao carregar dados. Verifique se a API está em execução.';
            }
        }

        function renderCharts(policies, reportData) {
            // Gráfico de comparação de valores médios
            const ctx1 = document.getElementById('valueChart').getContext('2d');
            if (valueChart) valueChart.destroy();
            valueChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['Valor Médio do Seguro', 'Valor Médio do Veículo'],
                    datasets: [{
                        label: 'Valores em R$',
                        data: [reportData.averageInsuranceValue, reportData.averageVehicleValue],
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)'
                        ],
                        borderColor: [
                            'rgba(102, 126, 234, 1)',
                            'rgba(118, 75, 162, 1)'
                        ],
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return 'R$ ' + value.toLocaleString('pt-BR');
                                }
                            }
                        }
                    }
                }
            });

            // Gráfico de distribuição de apólices por faixa de valor
            const ranges = {
                'Até R$ 500': 0,
                'R$ 500 - R$ 1.000': 0,
                'R$ 1.000 - R$ 2.000': 0,
                'Acima de R$ 2.000': 0
            };

            policies.forEach(policy => {
                const value = policy.insuranceValue;
                if (value <= 500) ranges['Até R$ 500']++;
                else if (value <= 1000) ranges['R$ 500 - R$ 1.000']++;
                else if (value <= 2000) ranges['R$ 1.000 - R$ 2.000']++;
                else ranges['Acima de R$ 2.000']++;
            });

            const ctx2 = document.getElementById('insuranceChart').getContext('2d');
            if (insuranceChart) insuranceChart.destroy();
            insuranceChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ranges),
                    datasets: [{
                        data: Object.values(ranges),
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(237, 100, 166, 0.8)',
                            'rgba(255, 154, 158, 0.8)'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function renderTable(policies) {
            const container = document.getElementById('tableContainer');
            
            if (policies.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Nenhuma apólice encontrada</h3>
                        <p>Crie sua primeira apólice usando a API</p>
                    </div>
                `;
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Segurado</th>
                            <th>CPF</th>
                            <th>Veículo</th>
                            <th>Valor do Veículo</th>
                            <th>Valor do Seguro</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${policies.map(p => `
                            <tr>
                                <td><strong>#${p.id}</strong></td>
                                <td>${p.insured.name}</td>
                                <td>${formatCpf(p.insured.cpf)}</td>
                                <td>${p.vehicle.model}</td>
                                <td>R$ ${p.vehicle.value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                <td><strong>R$ ${p.insuranceValue.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></td>
                                <td>${new Date(p.createdAt).toLocaleDateString('pt-BR')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        }

        function formatCpf(cpf) {
            if (!cpf) return 'N/A';
            return String(cpf).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }

        // Carregar dados ao iniciar
        loadData();

        // Auto-refresh a cada 30 segundos
        setInterval(loadData, 30000);
    </script>
</body>
</html>
